; Unofficial-KR-Sfall 한글 폰트 설정
; 이 파일을 ddraw.dll과 함께 fallout2.exe가 있는 폴더에 둡니다.
;
; Name에는 Windows에 설치된 폰트 이름을 그대로 입력합니다.
; 예: 돋움, 맑은 고딕, 궁서, 바탕
;
; 별도 폰트 파일을 같이 쓰고 싶으면 File에 게임 폴더 기준 상대 경로나
; C:\Windows\Fonts\malgun.ttf 같은 절대 경로를 입력할 수 있습니다.

[TEXT]
; 작은 글꼴 (대화문, 로그 메시지)
Name=돋움
Size=11
Weight=400

[BUTTON]
; 큰 UI 글꼴 (대화 제목, 일반 버튼)
Name=돋움
Size=19
Weight=5000

[GNW]
; GNW UI 글꼴 (메인 메뉴 제목, 커스텀 버튼)
Name=돋움
Size=19
Weight=5000

[MISC]
; 한글 텍스트 렌더러 사용 여부 (0 = 끔, 1 = 켬)
Enable=1
ButtonThreshold=16
