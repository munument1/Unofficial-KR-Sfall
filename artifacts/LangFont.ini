; Unofficial-KR-Sfall Korean font settings
; Place this file next to fallout2.exe with ddraw.dll.
;
; Installed Windows fonts can be used by setting only the FontFace value.
; Bundled or custom font files can be used by setting FontFile to a relative
; path from the game folder or to an absolute path such as C:\Windows\Fonts\malgun.ttf.

[Main]
; Enable the Korean text renderer (0 = disabled, 1 = enabled)
KoreanText=1
KoreanTextButtonThreshold=16

; Small font (dialog text, log messages)
; Leave KoreanTextTextFontFile empty when using an installed Windows font.
KoreanTextTextFontFile=
KoreanTextTextFontFace=Malgun Gothic
KoreanTextTextFontHeight=10
KoreanTextTextCellWidth=10
KoreanTextTextRenderHeight=11
KoreanTextTextYOffset=0
KoreanTextTextFontWeight=400
KoreanTextTextExtraBold=0

; Large UI font (dialog headers, standard buttons)
KoreanTextFontFile=
KoreanTextFontFace=Malgun Gothic
KoreanTextFontHeight=17
KoreanTextCellWidth=19
KoreanTextRenderHeight=25
KoreanTextYOffset=0
KoreanTextFontWeight=700
KoreanTextExtraBold=0

; GNW UI font (main menu titles, custom buttons)
KoreanTextGnwFontFile=
KoreanTextGnwFontFace=Malgun Gothic
KoreanTextGnwFontHeight=17
KoreanTextGnwCellWidth=19
KoreanTextGnwRenderHeight=25
KoreanTextGnwYOffset=0
KoreanTextGnwFontWeight=700
KoreanTextGnwExtraBold=0
